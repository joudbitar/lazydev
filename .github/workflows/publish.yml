name: publish

# Publishes to npm when a GitHub release is published, via trusted publishing:
# the npm package is configured (npmjs.com -> package -> Settings -> Trusted
# Publisher) to trust this repo's publish.yml, and npm authenticates the run
# with an OIDC token from GitHub. No npm token, no secret, and provenance is
# attested from the same identity. Token-based CI publishing dies with EOTP
# under npm's post-2025 hardening, which is how this workflow got here.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing + provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
      - run: npm install -g npm@latest
      - run: npm test
      - name: publish (skips if version already on npm)
        run: |
          pkg="$(node -p 'require("./package.json").name')"
          ver="$(node -p 'require("./package.json").version')"
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "$pkg@$ver already on npm; skipping publish."
            exit 0
          fi
          npm publish --provenance --access public
